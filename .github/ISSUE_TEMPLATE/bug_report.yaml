name: Bug report
description: Report a defect or unexpected behavior in XPlug
title: '[Bug]: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Briefly describe the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can this be reproduced?
      placeholder: |
        1. Run command ...
        2. Use this log file ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: sample
    attributes:
      label: Relevant log snippet or command output
      description: Redact secrets before pasting.
      render: bash

  - type: textarea
    id: docs
    attributes:
      label: Related docs or help text
      description: If the behavior differs from README, docs, or `--help`, mention that here.

  - type: input
    id: version
    attributes:
      label: XPlug version
      placeholder: e.g. 0.1.0

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 20.11.1

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Ubuntu 24.04 / macOS 15 / Windows 11

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues
          required: true
        - label: I removed or redacted sensitive data
          required: true
